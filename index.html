<!DOCTYPE html>
<html>
<head>
    <title>Focus Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Focus Tracker</h1>

    <h2 id="status">Not Started</h2>

    <button onclick="startStudy()">Start Study</button>
    <button onclick="distracted()">Got Distracted</button>
    <button onclick="backToStudy()">Back to Study</button>
    <button onclick="endSession()">End Session</button>

    <h3 id="time">Time: 0 sec</h3>
    <h3 id="count">Distractions: 0</h3>

</div>

<script src="script.js"></script>

</body>
</html>
